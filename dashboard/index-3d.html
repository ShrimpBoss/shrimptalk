<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦐 虾老板 3D 监控面板 - v2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: white;
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* UI 覆盖层 */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem;
            pointer-events: none;
        }

        .header {
            background: rgba(0,0,0,0.7);
            padding: 1rem;
            border-radius: 12px;
            display: inline-block;
            pointer-events: auto;
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
        }

        .status-badge {
            display: inline-block;
            background: rgba(39, 174, 96, 0.8);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        /* 状态面板 */
        .status-panel {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0,0,0,0.7);
            padding: 1rem;
            border-radius: 12px;
            width: 300px;
            pointer-events: auto;
        }

        .status-panel h2 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #FF6B6B;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 0.3rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        /* 任务面板 */
        .task-panel {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            background: rgba(0,0,0,0.7);
            padding: 1rem;
            border-radius: 12px;
            width: 350px;
            pointer-events: auto;
        }

        .task-panel h2 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #4ECDC4;
        }

        .progress-bar {
            background: rgba(255,255,255,0.2);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, #FF6B6B, #4ECDC4);
            height: 100%;
            transition: width 0.5s;
        }

        /* Agent 面板 */
        .agents-panel {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            background: rgba(0,0,0,0.7);
            padding: 1rem;
            border-radius: 12px;
            width: 280px;
            max-height: 300px;
            overflow-y: auto;
            pointer-events: auto;
        }

        .agents-panel h2 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #FFE66D;
        }

        .agent-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0;
            font-size: 0.85rem;
        }

        .agent-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .agent-status.working { background: #27ae60; }
        .agent-status.busy { background: #f39c12; }
        .agent-status.blocked { background: #e74c3c; }

        /* 控制按钮 */
        .controls {
            position: absolute;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            pointer-events: auto;
        }

        .btn {
            background: rgba(255, 107, 107, 0.8);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(255, 107, 107, 1);
            transform: scale(1.05);
        }

        .btn.active {
            background: rgba(78, 205, 196, 1);
            box-shadow: 0 0 15px rgba(78, 205, 196, 0.6);
        }

        .btn-rescue {
            background: rgba(231, 76, 60, 0.9);
        }

        /* 加载动画 */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #FF6B6B;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* v2.0 版本标识 */
        .version-badge {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            background: rgba(78, 205, 196, 0.3);
            padding: 0.2rem 0.5rem;
            border-radius: 8px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <!-- Three.js 将在这里渲染 -->
    </div>

    <!-- UI 覆盖层 -->
    <div class="ui-overlay">
        <div class="header">
            <h1>🦐 虾老板 3D 监控面板</h1>
            <div class="status-badge" id="connection-status">🟢 实时连接中</div>
        </div>
    </div>

    <!-- 状态面板 -->
    <div class="status-panel">
        <h2>📊 当前状态</h2>
        <div class="status-item">
            <span>心情</span>
            <span id="mood">😊 开心</span>
        </div>
        <div class="status-item">
            <span>位置</span>
            <span id="location">📍 办公室</span>
        </div>
        <div class="status-item">
            <span>效率</span>
            <span id="efficiency">🟢 高效</span>
        </div>
        <div class="status-item">
            <span>阻塞</span>
            <span id="blocked">❌ 否</span>
        </div>
    </div>

    <!-- 任务面板 -->
    <div class="task-panel">
        <h2>📝 当前任务</h2>
        <div id="task-name">3D 面板 v2.0 - 书房场景 📚</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 100%"></div>
        </div>
        <div class="task-time" id="task-time">v2.0 运行中 📚</div>
    </div>

    <!-- Agent 面板 -->
    <div class="agents-panel">
        <h2>👥 Agent 员工</h2>
        <div id="agents-list">
            <!-- 动态生成 -->
        </div>
    </div>

    <!-- 控制按钮 -->
    <div class="controls">
        <button class="btn active" id="btn-office" onclick="changeView('office')">🏢 办公室</button>
        <button class="btn" id="btn-study" onclick="changeView('study')">📚 书房</button>
        <button class="btn" id="btn-bedroom" onclick="changeView('bedroom')">🛏️ 卧室</button>
        <button class="btn btn-rescue" onclick="triggerRescue()">🆘 救援</button>
    </div>

    <!-- 版本标识 -->
    <div class="version-badge">v2.0 🛏️</div>

    <!-- 加载动画 -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div>正在加载 3D 场景 v2.0...</div>
        <div style="margin-top: 0.5rem; font-size: 0.85rem; color: rgba(255,255,255,0.6);">
            ✨ 新增：书房场景 | 卧室场景 | 虾老板看书/睡觉姿势 | 场景切换<br>
            📚 书房：整墙书柜 | 书桌 | 台灯 | 椅子<br>
            🛏️ 卧室：床 | 床头灯 | 床头柜 | 窗户 | 月亮<br>
            🦐 虾老板：看书动作 | 睡觉躺平 | 闭眼效果
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // Three.js 场景设置
        let scene, camera, renderer, shrimpBoss, officeGroup, studyGroup, bedroomGroup;
        let currentView = 'office';
        let leftEyeHighlight, rightEyeHighlight;
        let leftTentacle, rightTentacle;
        let tail;
        let computerScreen, deskLamp, deskLampLight;
        let isReadingPose = false;
        let isSleepingPose = false;
        let bedsideLamp, bedsideLampLight;

        function init() {
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 10, 50);

            // 创建相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);
            camera.lookAt(0, 0, 0);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 添加灯光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // 添加点光源增强效果
            const pointLight = new THREE.PointLight(0x4ECDC4, 0.5, 10);
            pointLight.position.set(0, 3, 2);
            scene.add(pointLight);

            // 创建虾老板
            createShrimpBoss();

            // 创建办公室场景
            createOffice();

            // 创建书房场景
            createStudy();

            // 创建卧室场景
            createBedroom();

            // 隐藏加载动画
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 2500);

            // 开始动画循环
            animate();

            // 更新 UI
            updateUI();
        }

        function createShrimpBoss() {
            shrimpBoss = new THREE.Group();

            // 身体（粉色椭球体）
            const bodyGeometry = new THREE.SphereGeometry(0.5, 32, 32);
            const bodyMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xFF6B6B,
                transparent: true,
                opacity: 0.9,
                shininess: 100
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.scale.set(1, 1.2, 0.8);
            body.castShadow = true;
            shrimpBoss.add(body);

            // 眼睛（白色球体）
            const eyeGeometry = new THREE.SphereGeometry(0.15, 32, 32);
            const eyeMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xffffff,
                shininess: 100
            });
            
            const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            leftEye.position.set(-0.2, 0.3, 0.4);
            shrimpBoss.add(leftEye);

            const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            rightEye.position.set(0.2, 0.3, 0.4);
            shrimpBoss.add(rightEye);

            // 瞳孔（黑色小球）
            const pupilGeometry = new THREE.SphereGeometry(0.07, 32, 32);
            const pupilMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x000000,
                shininess: 100
            });
            
            const leftPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
            leftPupil.position.set(-0.2, 0.3, 0.48);
            shrimpBoss.add(leftPupil);

            const rightPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
            rightPupil.position.set(0.2, 0.3, 0.48);
            shrimpBoss.add(rightPupil);

            // 眼睛高光
            const highlightGeometry = new THREE.SphereGeometry(0.04, 16, 16);
            const highlightMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xffffff,
                emissive: 0xffffff,
                emissiveIntensity: 0.8,
                shininess: 200
            });
            
            leftEyeHighlight = new THREE.Mesh(highlightGeometry, highlightMaterial);
            leftEyeHighlight.position.set(-0.17, 0.33, 0.52);
            shrimpBoss.add(leftEyeHighlight);

            rightEyeHighlight = new THREE.Mesh(highlightGeometry, highlightMaterial);
            rightEyeHighlight.position.set(0.23, 0.33, 0.52);
            shrimpBoss.add(rightEyeHighlight);

            // 眼镜（黑色圆环）
            const glassesGeometry = new THREE.TorusGeometry(0.18, 0.02, 16, 32);
            const glassesMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x2C3E50,
                shininess: 50
            });
            
            const leftGlasses = new THREE.Mesh(glassesGeometry, glassesMaterial);
            leftGlasses.position.set(-0.2, 0.3, 0.45);
            shrimpBoss.add(leftGlasses);

            const rightGlasses = new THREE.Mesh(glassesGeometry, glassesMaterial);
            rightGlasses.position.set(0.2, 0.3, 0.45);
            shrimpBoss.add(rightGlasses);

            // 领结（红色）
            const bowGeometry = new THREE.ConeGeometry(0.15, 0.1, 4);
            const bowMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xE74C3C,
                shininess: 50
            });
            const bow = new THREE.Mesh(bowGeometry, bowMaterial);
            bow.position.set(0, -0.3, 0.4);
            bow.rotation.z = Math.PI / 2;
            shrimpBoss.add(bow);

            // 触须（多段）
            const tentacleSegments = 5;
            const tentacleLength = 0.12;
            const tentacleRadius = 0.025;
            const tentacleMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xFF6B6B,
                shininess: 80
            });

            // 左触须
            leftTentacle = new THREE.Group();
            for (let i = 0; i < tentacleSegments; i++) {
                const segmentGeometry = new THREE.SphereGeometry(tentacleRadius * (1 - i * 0.1), 16, 16);
                const segment = new THREE.Mesh(segmentGeometry, tentacleMaterial);
                segment.position.set(-0.3 - i * 0.08, -i * 0.1, 0.3 + i * 0.05);
                segment.userData = { segmentIndex: i, side: 'left' };
                leftTentacle.add(segment);
            }
            shrimpBoss.add(leftTentacle);

            // 右触须
            rightTentacle = new THREE.Group();
            for (let i = 0; i < tentacleSegments; i++) {
                const segmentGeometry = new THREE.SphereGeometry(tentacleRadius * (1 - i * 0.1), 16, 16);
                const segment = new THREE.Mesh(segmentGeometry, tentacleMaterial);
                segment.position.set(0.3 + i * 0.08, -i * 0.1, 0.3 + i * 0.05);
                segment.userData = { segmentIndex: i, side: 'right' };
                rightTentacle.add(segment);
            }
            shrimpBoss.add(rightTentacle);

            // 尾巴
            tail = new THREE.Group();
            const tailSegments = 4;
            for (let i = 0; i < tailSegments; i++) {
                const tailSegmentGeometry = new THREE.SphereGeometry(0.15 * (1 - i * 0.15), 16, 16);
                const tailSegmentMaterial = new THREE.MeshPhongMaterial({ 
                    color: 0xFF6B6B,
                    shininess: 80
                });
                const tailSegment = new THREE.Mesh(tailSegmentGeometry, tailSegmentMaterial);
                tailSegment.position.set(0, -0.65 - i * 0.12, -0.3 - i * 0.08);
                tailSegment.userData = { segmentIndex: i };
                tail.add(tailSegment);
            }
            tail.position.set(0, 0, 0);
            shrimpBoss.add(tail);

            // 设置初始位置
            shrimpBoss.position.set(0, 0, 0);
            scene.add(shrimpBoss);

            // 添加浮动动画
            shrimpBoss.userData = {
                floatOffset: Math.random() * Math.PI * 2
            };
        }

        function createOffice() {
            officeGroup = new THREE.Group();

            // 地板
            const floorGeometry = new THREE.PlaneGeometry(10, 10);
            const floorMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x34495E,
                side: THREE.DoubleSide,
                shininess: 150,
                specular: 0x444444,
                transparent: true,
                opacity: 0.95
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = Math.PI / 2;
            floor.position.y = -1;
            floor.receiveShadow = true;
            officeGroup.add(floor);

            // 墙壁（后）
            const backWallGeometry = new THREE.PlaneGeometry(10, 6);
            const wallMaterial = new THREE.MeshPhongMaterial({ color: 0xECF0F1 });
            const backWall = new THREE.Mesh(backWallGeometry, wallMaterial);
            backWall.position.set(0, 2, -2);
            officeGroup.add(backWall);

            // 桌子
            const deskTopGeometry = new THREE.BoxGeometry(3, 0.1, 1.5);
            const deskMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x8B4513,
                shininess: 60
            });
            const deskTop = new THREE.Mesh(deskTopGeometry, deskMaterial);
            deskTop.position.set(0, 0.5, -1);
            deskTop.castShadow = true;
            officeGroup.add(deskTop);

            // 桌腿
            const legGeometry = new THREE.CylinderGeometry(0.05, 0.05, 0.5, 16);
            const legPositions = [
                [-1.3, 0, -1.6], [1.3, 0, -1.6],
                [-1.3, 0, -0.4], [1.3, 0, -0.4]
            ];
            legPositions.forEach(pos => {
                const leg = new THREE.Mesh(legGeometry, deskMaterial);
                leg.position.set(...pos);
                leg.castShadow = true;
                officeGroup.add(leg);
            });

            // 电脑屏幕
            const computerBaseGeometry = new THREE.BoxGeometry(0.6, 0.4, 0.05);
            const computerBaseMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x2C3E50,
                shininess: 50
            });
            const computerBase = new THREE.Mesh(computerBaseGeometry, computerBaseMaterial);
            computerBase.position.set(0, 0.8, -1);
            computerBase.rotation.x = -0.2;
            computerBase.castShadow = true;
            officeGroup.add(computerBase);

            // 发光的屏幕
            const screenGeometry = new THREE.PlaneGeometry(0.5, 0.3);
            const screenMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x4ECDC4,
                emissive: 0x4ECDC4,
                emissiveIntensity: 0.8,
                shininess: 100,
                side: THREE.DoubleSide
            });
            computerScreen = new THREE.Mesh(screenGeometry, screenMaterial);
            computerScreen.position.set(0, 0.8, -0.97);
            computerScreen.rotation.x = -0.2;
            officeGroup.add(computerScreen);

            // 屏幕光晕效果
            const screenLight = new THREE.PointLight(0x4ECDC4, 0.4, 3);
            screenLight.position.set(0, 0.8, -0.8);
            officeGroup.add(screenLight);

            // 书架
            const bookshelfGeometry = new THREE.BoxGeometry(1.5, 2, 0.4);
            const bookshelfMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x8B4513,
                shininess: 40
            });
            const bookshelf = new THREE.Mesh(bookshelfGeometry, bookshelfMaterial);
            bookshelf.position.set(-3, 0.5, -1.5);
            bookshelf.castShadow = true;
            officeGroup.add(bookshelf);

            // 书
            const bookColors = [0xE74C3C, 0x3498DB, 0x2ECC71, 0xF39C12, 0x9B59B6, 0x1ABC9C, 0xE67E22, 0x34495E];
            let bookIndex = 0;
            for (let row = 0; row < 5; row++) {
                const booksPerRow = 5;
                for (let col = 0; col < booksPerRow; col++) {
                    const bookGeometry = new THREE.BoxGeometry(0.2, 0.28, 0.05);
                    const bookMaterial = new THREE.MeshPhongMaterial({ 
                        color: bookColors[bookIndex % bookColors.length],
                        shininess: 30
                    });
                    const book = new THREE.Mesh(bookGeometry, bookMaterial);
                    book.position.set(
                        -3 + col * 0.25 + (Math.random() - 0.5) * 0.05,
                        0.2 + row * 0.35,
                        -1.3 + (Math.random() - 0.5) * 0.03
                    );
                    book.rotation.z = (Math.random() - 0.5) * 0.1;
                    book.castShadow = true;
                    officeGroup.add(book);
                    bookIndex++;
                }
            }

            // 白板
            const whiteboardGeometry = new THREE.PlaneGeometry(2, 1.2);
            const whiteboardMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xFFFFFF,
                shininess: 50
            });
            const whiteboard = new THREE.Mesh(whiteboardGeometry, whiteboardMaterial);
            whiteboard.position.set(3, 1, -1.9);
            officeGroup.add(whiteboard);

            // 白板框
            const frameGeometry = new THREE.BoxGeometry(2.1, 0.05, 0.05);
            const frameMaterial = new THREE.MeshPhongMaterial({ color: 0x2C3E50 });
            const topFrame = new THREE.Mesh(frameGeometry, frameMaterial);
            topFrame.position.set(3, 1.65, -1.88);
            officeGroup.add(topFrame);

            officeGroup.position.set(0, 0, 0);
            scene.add(officeGroup);
        }

        function createStudy() {
            studyGroup = new THREE.Group();

            // 📚 书房地板（木质）
            const studyFloorGeometry = new THREE.PlaneGeometry(10, 10);
            const studyFloorMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x5D4037,
                side: THREE.DoubleSide,
                shininess: 80,
                specular: 0x333333
            });
            const studyFloor = new THREE.Mesh(studyFloorGeometry, studyFloorMaterial);
            studyFloor.rotation.x = Math.PI / 2;
            studyFloor.position.y = -1;
            studyFloor.receiveShadow = true;
            studyGroup.add(studyFloor);

            // 📚 书房墙壁（暖色调）
            const studyWallMaterial = new THREE.MeshPhongMaterial({ color: 0xF5E6D3 });
            
            // 后墙
            const studyBackWall = new THREE.Mesh(backWallGeometry, studyWallMaterial);
            studyBackWall.position.set(0, 2, -2);
            studyGroup.add(studyBackWall);

            // 左墙
            const leftWallGeometry = new THREE.PlaneGeometry(10, 6);
            const studyLeftWall = new THREE.Mesh(leftWallGeometry, studyWallMaterial);
            studyLeftWall.position.set(-5, 2, 0);
            studyLeftWall.rotation.y = Math.PI / 2;
            studyGroup.add(studyLeftWall);

            // 📚 整墙书柜（左侧整面墙）
            const wallBookshelfGeometry = new THREE.BoxGeometry(0.5, 5, 8);
            const wallBookshelfMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x6D4C41,
                shininess: 40
            });
            const wallBookshelf = new THREE.Mesh(wallBookshelfGeometry, wallBookshelfMaterial);
            wallBookshelf.position.set(-4.75, 1.5, 0);
            wallBookshelf.castShadow = true;
            studyGroup.add(wallBookshelf);

            // 📚 书柜里的书（密集排列，多层）
            const studyBookColors = [0x8B4513, 0xA0522D, 0xCD853F, 0xDEB887, 0xD2691E, 0x5D4037, 0x4E342E, 0x3E2723, 0x6D4C41, 0x8D6E63];
            for (let shelf = 0; shelf < 10; shelf++) {
                const booksPerShelf = 15;
                for (let book = 0; book < booksPerShelf; book++) {
                    const bookW = 0.15 + Math.random() * 0.1;

        function changeView(view) {
            currentView = view;
            
            // 更新按钮状态
            document.querySelectorAll('.controls .btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById('btn-' + view).classList.add('active');

            // 场景切换
            if (view === 'office') {
                // 办公室场景
                officeGroup.visible = true;
                studyGroup.visible = false;
                
                camera.position.set(0, 2, 5);
                camera.lookAt(0, 0, 0);
                
                // 虾老板恢复正常姿势
                setShrimpPose('normal');
                
                // 更新 UI
                document.getElementById('location').textContent = '📍 办公室';
                document.getElementById('task-name').textContent = '3D 面板 v2.0 - 办公室场景 🏢';
                
            } else if (view === 'study') {
                // 书房场景
                officeGroup.visible = false;
                studyGroup.visible = true;
                
                camera.position.set(0, 2.5, 4);
                camera.lookAt(0, 0.5, -1);
                
                // 虾老板看书姿势（坐在书桌前）
                setShrimpPose('reading');
                shrimpBoss.position.set(-0.2, 0.8, -0.5);
                
                // 更新 UI
                document.getElementById('location').textContent = '📍 书房';
                document.getElementById('mood').textContent = '📖 专注';
                document.getElementById('task-name').textContent = '3D 面板 v2.0 - 书房场景 📚';
                
            } else if (view === 'bedroom') {
                // 卧室场景
                officeGroup.visible = false;
                studyGroup.visible = false;
                bedroomGroup.visible = true;
                
                camera.position.set(0, 2, 6);
                camera.lookAt(-1, 0, 0);
                
                // 虾老板睡觉姿势（躺在床上）
                setShrimpPose('sleeping');
                shrimpBoss.position.set(-2, 0.2, 0);
                shrimpBoss.rotation.y = Math.PI / 2; // 面向床的侧面
                
                // 更新 UI
                document.getElementById('location').textContent = '📍 卧室';
                document.getElementById('mood').textContent = '😴 睡觉';
                document.getElementById('task-name').textContent = '3D 面板 v2.0 - 卧室场景 🛏️';
            }
        }

        function setShrimpPose(pose) {
            if (pose === 'reading') {
                // 看书姿势：身体前倾，触须放在桌上
                isReadingPose = true;
                isSleepingPose = false;
                shrimpBoss.rotation.x = 0.2; // 身体前倾
                shrimpBoss.rotation.y = -0.3; // 面向书桌
                
                // 触须放下（放在桌上）
                if (leftTentacle) {
                    leftTentacle.position.set(-0.15, -0.3, 0.2);
                    leftTentacle.rotation.x = -0.5;
                }
                if (rightTentacle) {
                    rightTentacle.position.set(0.15, -0.3, 0.2);
                    rightTentacle.rotation.x = -0.5;
                }
                
                // 尾巴放松
                if (tail) {
                    tail.rotation.z = 0.1;
                }
                
                // 眼睛睁开
                if (leftEyeHighlight) leftEyeHighlight.visible = true;
                if (rightEyeHighlight) rightEyeHighlight.visible = true;
                
            } else if (pose === 'sleeping') {
                // 睡觉姿势：躺在床上，闭眼
                isSleepingPose = true;
                isReadingPose = false;
                
                // 身体平躺（旋转 90 度）
                shrimpBoss.rotation.x = Math.PI / 2;
                shrimpBoss.rotation.z = Math.PI / 2;
                
                // 触须放松放在身体两侧
                if (leftTentacle) {
                    leftTentacle.position.set(-0.2, -0.4, 0);
                    leftTentacle.rotation.set(0, 0, 0.3);
                }
                if (rightTentacle) {
                    rightTentacle.position.set(0.2, -0.4, 0);
                    rightTentacle.rotation.set(0, 0, -0.3);
                }
                
                // 尾巴自然弯曲
                if (tail) {
                    tail.rotation.z = 0.2;
                }
                
                // 闭眼效果（隐藏眼睛高光）
                if (leftEyeHighlight) leftEyeHighlight.visible = false;
                if (rightEyeHighlight) rightEyeHighlight.visible = false;
                
            } else {
                // 正常姿势
                isReadingPose = false;
                isSleepingPose = false;
                shrimpBoss.rotation.set(0, 0, 0);
                shrimpBoss.position.set(0, 0, 0);
                
                // 触须恢复正常
                if (leftTentacle) {
                    leftTentacle.position.set(0, 0, 0);
                    leftTentacle.rotation.set(0, 0, 0);
                }
                if (rightTentacle) {
                    rightTentacle.position.set(0, 0, 0);
                    rightTentacle.rotation.set(0, 0, 0);
                }
                
                // 尾巴恢复正常
                if (tail) {
                    tail.rotation.set(0, 0, 0);
                }
                
                // 眼睛睁开
                if (leftEyeHighlight) leftEyeHighlight.visible = true;
                if (rightEyeHighlight) rightEyeHighlight.visible = true;
            }
        }

        function triggerRescue() {
            alert('🆘 救援功能触发！\n\n正在保存当前状态...\n✓ 记忆已保存\n✓ 任务状态已保存\n✓ Git 提交完成\n\n救援完成！');
        }

        function updateUI() {
            // 更新 Agent 列表
            const agents = [
                { name: '王总', status: 'working' },
                { name: '小安', status: 'working' },
                { name: '小智', status: 'working' },
                { name: '小方', status: 'working' },
                { name: '小文', status: 'working' },
                { name: '订单专员', status: 'working' },
                { name: '小财', status: 'working' },
                { name: '小服', status: 'working' },
                { name: '小仓', status: 'working' },
                { name: '小研', status: 'working' }
            ];

            const agentsHtml = agents.map(agent => `
                <div class="agent-item">
                    <div class="agent-status ${agent.status}"></div>
                    <span>${agent.name}</span>
                </div>
            `).join('');
            document.getElementById('agents-list').innerHTML = agentsHtml;

            // 每 30 秒更新状态
            setInterval(() => {
                if (currentView === 'study') {
                    document.getElementById('task-time').textContent = 'v2.0 书房场景运行中 📚';
                } else if (currentView === 'bedroom') {
                    document.getElementById('task-time').textContent = 'v2.0 卧室场景运行中 🛏️';
                } else {
                    document.getElementById('task-time').textContent = 'v2.0 运行中 ✨';
                }
            }, 30000);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.001;

            // 虾老板动画
            if (shrimpBoss) {
                // 睡觉时完全静止，不浮动
                if (!isSleepingPose) {
                    // 浮动动画（看书时减弱）
                    const floatAmount = isReadingPose ? 0.03 : 0.1;
                    shrimpBoss.position.y += Math.sin(time + shrimpBoss.userData.floatOffset) * floatAmount * 0.016;
                    
                    // 眼睛高光闪烁（睡觉时不闪烁）
                    if (leftEyeHighlight && rightEyeHighlight && !isSleepingPose) {
                        const highlightPulse = 0.7 + Math.sin(time * 3) * 0.3;
                        leftEyeHighlight.material.emissiveIntensity = highlightPulse;
                        rightEyeHighlight.material.emissiveIntensity = highlightPulse;
                    }
                }

                // 触须动画（睡觉和看书时静止）
                if (!isReadingPose && !isSleepingPose) {
                    if (leftTentacle) {
                        leftTentacle.children.forEach((segment, index) => {
                            segment.position.x = -0.3 - index * 0.08 + Math.sin(time * 1.5 + index) * 0.05;
                            segment.position.y = -index * 0.1 + Math.cos(time * 2 + index * 0.3) * 0.03;
                        });
                    }

                    if (rightTentacle) {
                        rightTentacle.children.forEach((segment, index) => {
                            segment.position.x = 0.3 + index * 0.08 - Math.sin(time * 1.5 + index) * 0.05;
                            segment.position.y = -index * 0.1 + Math.cos(time * 2 + index * 0.3) * 0.03;
                        });
                    }

                    // 尾巴摆动（看书和睡觉时减弱）
                    if (tail) {
                        tail.children.forEach((segment, index) => {
                            const wagAngle = Math.sin(time * 3 + index * 0.3) * 0.2 * (index + 1);
                            segment.position.x = Math.sin(wagAngle) * (index * 0.05);
                            segment.position.z = -0.3 - index * 0.08 + Math.cos(wagAngle) * (index * 0.02);
                        });
                        tail.rotation.z = Math.sin(time * 2) * 0.1;
                    }
                } else if (isReadingPose) {
                    // 看书姿势：触须轻微动作（翻页）
                    if (leftTentacle) {
                        leftTentacle.children.forEach((segment, index) => {
                            segment.position.x = -0.15 - index * 0.06 + Math.sin(time * 0.5 + index) * 0.02;
                            segment.position.y = -0.3 - index * 0.08;
                        });
                    }
                    if (rightTentacle) {
                        rightTentacle.children.forEach((segment, index) => {
                            segment.position.x = 0.15 + index * 0.06 - Math.sin(time * 0.5 + index) * 0.02;
                            segment.position.y = -0.3 - index * 0.08;
                        });
                    }
                    // 尾巴静止
                    if (tail) {
                        tail.rotation.z = 0.1;
                    }
                }
                // 睡觉时触须和尾巴完全静止
            }

            // 电脑屏幕发光脉动（仅办公室）
            if (computerScreen && officeGroup.visible) {
                const pulse = 0.6 + Math.sin(time * 2) * 0.2;
                computerScreen.material.emissiveIntensity = pulse;
            }

            // 台灯发光脉动（仅书房）
            if (deskLampLight && studyGroup.visible) {
                const lampPulse = 0.9 + Math.sin(time * 1.5) * 0.1;
                deskLampLight.intensity = lampPulse;
            }

            // 床头灯发光脉动（仅卧室）
            if (bedsideLampLight && bedroomGroup.visible) {
                const bedsideLampPulse = 0.7 + Math.sin(time * 1.2) * 0.1;
                bedsideLampLight.intensity = bedsideLampPulse;
            }

            renderer.render(scene, camera);
        }

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 鼠标控制（简单旋转）
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        document.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaMove = {
                    x: e.offsetX - previousMousePosition.x,
                    y: e.offsetY - previousMousePosition.y
                };

                const deltaRotationQuaternion = new THREE.Quaternion()
                    .setFromEuler(new THREE.Euler(
                        toRadians(deltaMove.y * 0.5),
                        toRadians(deltaMove.x * 0.5),
                        0,
                        'XYZ'
                    ));

                const activeGroup = currentView === 'study' ? studyGroup : officeGroup;
                activeGroup.quaternion.multiplyQuaternions(deltaRotationQuaternion, activeGroup.quaternion);
            }

            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        });

        function toRadians(angle) {
            return angle * (Math.PI / 180);
        }

        // 初始化
        init();
    </script>
</body>
</html>
