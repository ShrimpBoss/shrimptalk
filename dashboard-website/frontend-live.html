<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司管控中心 - 情绪用品跨境</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #F5F7FA; color: #1A1A1A; line-height: 1.6; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { background: #FFFFFF; padding: 20px 30px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; font-weight: 600; }
        .header .subtitle { font-size: 14px; color: #999999; margin-top: 4px; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .notification { position: relative; cursor: pointer; }
        .notification-badge { position: absolute; top: -8px; right: -8px; background: #FF0036; color: white; font-size: 11px; padding: 2px 6px; border-radius: 10px; }
        .user-profile { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #6B2CF5, #FF0036); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
        .metrics-section { background: #FFFFFF; padding: 24px 30px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .last-update { font-size: 12px; color: #999999; }
        .metrics-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
        .metric-card { background: #F5F7FA; padding: 20px; border-radius: 8px; text-align: center; transition: transform 0.2s; }
        .metric-card:hover { transform: translateY(-2px); }
        .metric-icon { font-size: 24px; margin-bottom: 8px; }
        .metric-value { font-size: 28px; font-weight: 700; color: #1A1A1A; }
        .metric-label { font-size: 13px; color: #999999; margin-top: 4px; }
        .metric-trend { font-size: 12px; margin-top: 8px; }
        .trend-up { color: #00C48C; }
        .trend-down { color: #FF4949; }
        .two-column { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: #FFFFFF; padding: 24px 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .agent-list { display: flex; flex-direction: column; gap: 12px; }
        .agent-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #F5F7FA; border-radius: 8px; }
        .agent-info { display: flex; align-items: center; gap: 12px; }
        .agent-status { width: 10px; height: 10px; border-radius: 50%; }
        .status-running { background: #00C48C; }
        .status-processing { background: #FF8800; }
        .agent-name { font-weight: 500; }
        .agent-task { font-size: 12px; color: #999999; }
        .approval-list { display: flex; flex-direction: column; gap: 16px; }
        .approval-item { padding: 16px; background: #F5F7FA; border-radius: 8px; border-left: 4px solid #6B2CF5; }
        .approval-title { font-weight: 500; margin-bottom: 8px; }
        .approval-actions { display: flex; gap: 8px; margin-top: 12px; }
        .btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-primary { background: #6B2CF5; color: white; }
        .btn-primary:hover { background: #5A23D5; }
        .btn-danger { background: #FF4949; color: white; }
        .btn-secondary { background: #FFFFFF; color: #666666; border: 1px solid #DDDDDD; }
        .product-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-top: 20px; }
        .product-card { background: #F5F7FA; border-radius: 8px; padding: 16px; transition: all 0.2s; }
        .product-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .product-image { width: 100%; aspect-ratio: 1; background: #FFFFFF; border-radius: 6px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; color: #999999; font-size: 32px; }
        .product-name { font-weight: 500; font-size: 14px; margin-bottom: 8px; }
        .product-margin { font-size: 13px; color: #00C48C; font-weight: 600; margin-bottom: 8px; }
        .product-trend { font-size: 12px; margin-bottom: 12px; }
        .product-actions { display: flex; gap: 6px; }
        .product-actions .btn { flex: 1; padding: 6px; font-size: 12px; }
        .progress-list { display: flex; flex-direction: column; gap: 16px; }
        .progress-item { display: flex; flex-direction: column; gap: 6px; }
        .progress-header { display: flex; justify-content: space-between; font-size: 13px; }
        .progress-bar { height: 8px; background: #E8E8E8; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
        .progress-fill.high { background: #00C48C; }
        .progress-fill.medium { background: #FF8800; }
        .suggestion-list { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
        .suggestion-item { padding: 12px 16px; background: #F5F7FA; border-radius: 8px; }
        .suggestion-status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-bottom: 6px; }
        .status-done { background: #00C48C; color: white; }
        .status-progress { background: #FF8800; color: white; }
        .status-pending { background: #6B2CF5; color: white; }
        .footer { text-align: center; padding: 30px; color: #999999; font-size: 13px; }
        .loading { text-align: center; padding: 40px; color: #999999; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .status-running-badge { background: #D4F5E8; color: #00C48C; }
        .status-processing-badge { background: #FFF4E5; color: #FF8800; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>🏠 公司管控中心</h1>
                <p class="subtitle">情绪用品跨境 · <span id="currentDate"></span></p>
            </div>
            <div class="header-right">
                <div class="notification">🔔 <span class="notification-badge" id="notificationCount">3</span></div>
                <div class="user-profile">
                    <div class="avatar">李</div>
                    <span>李总</span>
                </div>
            </div>
        </div>

        <!-- Metrics Section -->
        <div class="metrics-section">
            <div class="section-header">
                <div class="section-title">📊 今日核心指标</div>
                <div class="last-update">最后刷新：<span id="lastUpdate">--:--</span></div>
            </div>
            <div class="metrics-grid" id="metricsGrid">
                <div class="loading">加载数据中...</div>
            </div>
        </div>

        <!-- Two Column: Agent Status + Approvals -->
        <div class="two-column">
            <div class="card">
                <div class="section-header">
                    <div class="section-title">🤖 Agent 团队状态</div>
                </div>
                <div class="agent-list" id="agentList">
                    <div class="loading">加载数据中...</div>
                </div>
            </div>

            <div class="card">
                <div class="section-header">
                    <div class="section-title">⏳ 待您审批</div>
                </div>
                <div class="approval-list" id="approvalList">
                    <div class="loading">加载数据中...</div>
                </div>
            </div>
        </div>

        <!-- Product Recommendations -->
        <div class="card">
            <div class="section-header">
                <div class="section-title">🔥 选品推荐</div>
                <div class="last-update">产品 Agent · <span id="productDate"></span></div>
            </div>
            <div class="product-grid" id="productGrid">
                <div class="loading">加载数据中...</div>
            </div>
        </div>

        <!-- Security Monitor -->
        <div class="card" style="margin-top: 20px;">
            <div class="section-header">
                <div class="section-title">🔐 系统安全监控</div>
                <div class="last-update">安全运维 Agent · 实时更新</div>
            </div>
            <div class="two-column">
                <div>
                    <h4 style="margin-bottom: 12px; font-size: 14px; color: #666;">🖥️ 系统状态</h4>
                    <div id="securityStatus" class="agent-list">
                        <div class="loading">加载安全数据中...</div>
                    </div>
                </div>
                <div>
                    <h4 style="margin-bottom: 12px; font-size: 14px; color: #666;">🛡️ 安全统计</h4>
                    <div id="securityStats" class="agent-list">
                        <div class="loading">加载统计数据中...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Two Column: Sales Chart + Progress -->
        <div class="two-column" style="margin-top: 20px;">
            <div class="card">
                <div class="section-header">
                    <div class="section-title">📈 销售趋势（近 7 天）</div>
                </div>
                <div id="salesChart" style="height: 200px; display: flex; align-items: flex-end; justify-content: space-around; padding: 20px 0;">
                    <div class="loading">加载数据中...</div>
                </div>
            </div>

            <div class="card">
                <div class="section-header">
                    <div class="section-title">📋 工作进度</div>
                </div>
                <div class="progress-list" id="progressList">
                    <div class="loading">加载数据中...</div>
                </div>
            </div>
        </div>

        <!-- Suggestions -->
        <div class="card" style="margin-top: 20px;">
            <div class="section-header">
                <div class="section-title">💬 建议与指示</div>
            </div>
            <div class="suggestion-list" id="suggestionList">
                <div class="loading">加载数据中...</div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            情绪用品跨境公司管控中心 · 数据实时更新 · <span id="footerTime"></span>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';

        // 更新日期
        const now = new Date();
        document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        document.getElementById('productDate').textContent = now.toISOString().split('T')[0];
        document.getElementById('footerTime').textContent = now.toLocaleString('zh-CN');

        function updateTime() {
            const timeStr = new Date().getHours().toString().padStart(2, '0') + ':' + new Date().getMinutes().toString().padStart(2, '0');
            document.getElementById('lastUpdate').textContent = timeStr;
        }

        // 获取指标数据
        async function loadMetrics() {
            try {
                const res = await fetch(`${API_BASE}/dashboard/summary`);
                const data = await res.json();
                if (data.success) {
                    const m = data.data.metrics;
                    document.getElementById('metricsGrid').innerHTML = `
                        <div class="metric-card">
                            <div class="metric-icon">💰</div>
                            <div class="metric-value">$${m.gmv.value.toLocaleString()}</div>
                            <div class="metric-label">GMV</div>
                            <div class="metric-trend trend-up">↑ ${m.gmv.trend}%</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-icon">📦</div>
                            <div class="metric-value">${m.orders.value}</div>
                            <div class="metric-label">订单</div>
                            <div class="metric-trend trend-up">↑ ${m.orders.trend > 0 ? '+' : ''}${m.orders.trend}</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-icon">💵</div>
                            <div class="metric-value">$${m.profit.value.toLocaleString()}</div>
                            <div class="metric-label">利润</div>
                            <div class="metric-trend trend-up">↑ $${m.profit.trend > 0 ? '+' : ''}${m.profit.trend}</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-icon">📈</div>
                            <div class="metric-value">${m.roas.value}</div>
                            <div class="metric-label">ROAS</div>
                            <div class="metric-trend trend-up">↑ ${m.roas.trend > 0 ? '+' : ''}${m.roas.trend}</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-icon">⭐</div>
                            <div class="metric-value">${m.rating.value}%</div>
                            <div class="metric-label">好评率</div>
                            <div class="metric-trend trend-up">↑ ${m.rating.trend > 0 ? '+' : ''}${m.rating.trend}%</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-icon">🚚</div>
                            <div class="metric-value">${m.shipped.value}</div>
                            <div class="metric-label">发货</div>
                            <div class="metric-trend trend-up">↑ ${m.shipped.trend > 0 ? '+' : ''}${m.shipped.trend}</div>
                        </div>
                    `;
                }
            } catch (e) {
                console.error('加载指标失败:', e);
            }
        }

        // 获取 Agent 状态
        async function loadAgents() {
            try {
                const res = await fetch(`${API_BASE}/agents/status`);
                const data = await res.json();
                if (data.success) {
                    // 添加安全运维 Agent
                    const allAgents = [
                        ...data.data.agents,
                        { name: '安全运维 Agent', status: 'running', task: '系统监控 · 安全防护 · 无异常', exceptions: 0 }
                    ];
                    document.getElementById('agentList').innerHTML = allAgents.map(agent => `
                        <div class="agent-item">
                            <div class="agent-info">
                                <div class="agent-status status-${agent.status === 'running' ? 'running' : 'processing'}"></div>
                                <div>
                                    <div class="agent-name">${agent.name}</div>
                                    <div class="agent-task">${agent.task}</div>
                                </div>
                            </div>
                            <div class="status-badge status-${agent.status === 'running' ? 'running' : 'processing'}-badge">
                                ${agent.status === 'running' ? '🟢 运行中' : '🟡 处理中'}
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error('加载 Agent 状态失败:', e);
            }
        }

        // 获取审批事项
        async function loadApprovals() {
            try {
                const res = await fetch(`${API_BASE}/approvals/pending`);
                const data = await res.json();
                if (data.success) {
                    document.getElementById('approvalList').innerHTML = data.data.approvals.map((a, i) => `
                        <div class="approval-item">
                            <div class="approval-title">${i + 1}️⃣ ${a.title}</div>
                            <div style="font-size: 13px; color: #666; margin-bottom: 8px;">${a.description}</div>
                            <div class="approval-actions">
                                <button class="btn btn-primary" onclick="approve('${a.id}')">批准</button>
                                <button class="btn btn-danger" onclick="reject('${a.id}')">驳回</button>
                                <button class="btn btn-secondary">详情</button>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('notificationCount').textContent = data.data.total;
                }
            } catch (e) {
                console.error('加载审批失败:', e);
            }
        }

        // 获取产品推荐
        async function loadProducts() {
            try {
                const res = await fetch(`${API_BASE}/products/recommended`);
                const data = await res.json();
                if (data.success) {
                    document.getElementById('productGrid').innerHTML = data.data.products.map(p => `
                        <div class="product-card">
                            <div class="product-image">${p.image}</div>
                            <div class="product-name">${p.name}</div>
                            <div class="product-margin">毛利 ${p.grossMargin}%</div>
                            <div class="product-trend">${'🔥'.repeat(p.trendLevel)}</div>
                            <div class="product-actions">
                                <button class="btn btn-primary">批准</button>
                                <button class="btn btn-secondary">详情</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error('加载产品失败:', e);
            }
        }

        // 获取销售趋势
        async function loadSalesTrend() {
            try {
                const res = await fetch(`${API_BASE}/sales/trend`);
                const data = await res.json();
                if (data.success) {
                    const maxGmv = Math.max(...data.data.gmv);
                    document.getElementById('salesChart').innerHTML = data.data.dates.map((date, i) => {
                        const height = Math.round((data.data.gmv[i] / maxGmv) * 160);
                        return `
                            <div style="text-align: center;">
                                <div style="height: ${height}px; width: 40px; background: linear-gradient(to top, #6B2CF5, #A070F5); border-radius: 4px 4px 0 0;"></div>
                                <div style="font-size: 12px; color: #999; margin-top: 8px;">${date}</div>
                                <div style="font-size: 11px; color: #666;">$${data.data.gmv[i]}</div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (e) {
                console.error('加载销售趋势失败:', e);
            }
        }

        // 获取工作进度
        async function loadProgress() {
            try {
                const res = await fetch(`${API_BASE}/tasks/progress`);
                const data = await res.json();
                if (data.success) {
                    document.getElementById('progressList').innerHTML = data.data.departments.map(d => `
                        <div class="progress-item">
                            <div class="progress-header">
                                <span>${d.name} - ${d.task}</span>
                                <span>${d.progress}% (${d.current}/${d.target} ${d.unit})</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill ${d.progress >= 80 ? 'high' : d.progress >= 50 ? 'medium' : 'low'}" style="width: ${d.progress}%;"></div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error('加载进度失败:', e);
            }
        }

        // 获取建议列表
        async function loadSuggestions() {
            try {
                const res = await fetch(`${API_BASE}/suggestions`);
                const data = await res.json();
                if (data.success) {
                    const statusMap = {
                        'completed': { class: 'status-done', text: '✅ 已完成' },
                        'in_progress': { class: 'status-progress', text: '🔄 进行中' },
                        'pending': { class: 'status-pending', text: '⏳ 待处理' }
                    };
                    document.getElementById('suggestionList').innerHTML = data.data.suggestions.map(s => `
                        <div class="suggestion-item">
                            <span class="suggestion-status ${statusMap[s.status].class}">${statusMap[s.status].text}</span>
                            <div><strong>${s.title}</strong></div>
                            <div style="font-size: 12px; color: #999; margin-top: 4px;">${s.assignee}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error('加载建议失败:', e);
            }
        }

        // 审批操作
        async function approve(id) {
            try {
                await fetch(`${API_BASE}/approvals/${id}/decision`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ decision: 'approve' })
                });
                alert('审批已通过！');
                loadApprovals();
            } catch (e) {
                alert('操作失败');
            }
        }

        async function reject(id) {
            try {
                await fetch(`${API_BASE}/approvals/${id}/decision`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ decision: 'reject' })
                });
                alert('审批已驳回！');
                loadApprovals();
            } catch (e) {
                alert('操作失败');
            }
        }

        // 获取安全状态
        async function loadSecurity() {
            try {
                const res = await fetch(`${API_BASE}/security/status`);
                const data = await res.json();
                if (data.success) {
                    const s = data.data.system;
                    document.getElementById('securityStatus').innerHTML = `
                        <div class="agent-item">
                            <div class="agent-info">
                                <div class="agent-status status-${s.cpu.status === 'normal' ? 'running' : 'processing'}"></div>
                                <div>
                                    <div class="agent-name">CPU 使用率</div>
                                    <div class="agent-task">${s.cpu.value}%</div>
                                </div>
                            </div>
                            <div class="status-badge status-${s.cpu.status === 'normal' ? 'running' : 'processing'}-badge">
                                ${s.cpu.status === 'normal' ? '🟢 正常' : '🟡 偏高'}
                            </div>
                        </div>
                        <div class="agent-item">
                            <div class="agent-info">
                                <div class="agent-status status-${s.memory.status === 'normal' ? 'running' : 'processing'}"></div>
                                <div>
                                    <div class="agent-name">内存使用率</div>
                                    <div class="agent-task">${s.memory.value}%</div>
                                </div>
                            </div>
                            <div class="status-badge status-${s.memory.status === 'normal' ? 'running' : 'processing'}-badge">
                                ${s.memory.status === 'normal' ? '🟢 正常' : '🟡 偏高'}
                            </div>
                        </div>
                        <div class="agent-item">
                            <div class="agent-info">
                                <div class="agent-status status-${s.disk.status === 'normal' ? 'running' : 'processing'}"></div>
                                <div>
                                    <div class="agent-name">磁盘使用率</div>
                                    <div class="agent-task">${s.disk.value}%</div>
                                </div>
                            </div>
                            <div class="status-badge status-${s.disk.status === 'normal' ? 'running' : 'processing'}-badge">
                                ${s.disk.status === 'normal' ? '🟢 正常' : '🟡 偏高'}
                            </div>
                        </div>
                        <div class="agent-item">
                            <div class="agent-info">
                                <div class="agent-status status-${s.network.status === 'normal' ? 'running' : 'processing'}"></div>
                                <div>
                                    <div class="agent-name">网络状态</div>
                                    <div class="agent-task">${s.network.status === 'normal' ? '稳定' : '异常'}</div>
                                </div>
                            </div>
                            <div class="status-badge status-${s.network.status === 'normal' ? 'running' : 'processing'}-badge">
                                ${s.network.status === 'normal' ? '🟢 正常' : '🟡 异常'}
                            </div>
                        </div>
                    `;
                    
                    const sec = data.data.security;
                    document.getElementById('securityStats').innerHTML = `
                        <div class="agent-item">
                            <div class="agent-info">
                                <div>📊</div>
                                <div>
                                    <div class="agent-name">今日 API 调用</div>
                                    <div class="agent-task">${sec.apiCalls.toLocaleString()} 次</div>
                                </div>
                            </div>
                            <div>✅</div>
                        </div>
                        <div class="agent-item">
                            <div class="agent-info">
                                <div>🛡️</div>
                                <div>
                                    <div class="agent-name">安全事件</div>
                                    <div class="agent-task">${sec.securityEvents} 起</div>
                                </div>
                            </div>
                            <div class="status-badge status-done">🟢 无异常</div>
                        </div>
                        <div class="agent-item">
                            <div class="agent-info">
                                <div>🔒</div>
                                <div>
                                    <div class="agent-name">整体安全状态</div>
                                    <div class="agent-task">${sec.overallStatus === 'normal' ? '所有系统正常' : '需关注'}</div>
                                </div>
                            </div>
                            <div class="status-badge status-${sec.overallStatus === 'normal' ? 'running' : 'processing'}-badge">
                                ${sec.overallStatus === 'normal' ? '🟢 安全' : '🟡 警告'}
                            </div>
                        </div>
                    `;
                }
            } catch (e) {
                console.error('加载安全状态失败:', e);
            }
        }

        // 加载所有数据
        async function loadAll() {
            await Promise.all([
                loadMetrics(),
                loadAgents(),
                loadApprovals(),
                loadProducts(),
                loadSalesTrend(),
                loadProgress(),
                loadSuggestions(),
                loadSecurity()
            ]);
            updateTime();
        }

        // 初始加载
        loadAll();

        // 每 30 秒刷新
        setInterval(loadAll, 30000);
    </script>
</body>
</html>
